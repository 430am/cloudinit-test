#cloud-config
# This file is used to configure the CycleCloud application server.
package_update: true
package_upgrade: true

packages:
  - curl
  - gnupg2
  - apt-transport-https
  - openjdk-8-jre

runcmd:
  - [ mkdir, -m, 0755, -p, /etc/apt/keyrings ]
  - [ curl, -fsSL, "https://packages.microsoft.com/keys/microsoft.asc", "|", gpg, --dearmor, "|", tee, /etc/apt/keyrings/microsoft.gpg, ">", /dev/null ]
  - [ chmod, go+r, /etc/apt/keyrings/microsoft.gpg ]

apt:
  preserve_sources_list: true
  sources:
    cyclecloud.list:
      source: deb [signed-by=/etc/apt/keyrings/microsoft.gpg] https://packages.microsoft.com/repos/cyclecloud stable main
